spring.application.name=service

spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/social_media_analysis}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

spring.ai.openai.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:sk-9bf7fe78290b4e2192ba17bdd708bfaa}
spring.ai.openai.chat.options.model=${DEEPSEEK_MODEL:deepseek-chat}
spring.ai.openai.chat.options.temperature=0.1

topic.cache.hot-topics-key=dashboard:hot_topics:top50
topic.cache.hot-topics-ttl-minutes=10
